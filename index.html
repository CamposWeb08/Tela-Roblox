<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Entrar no Roblox</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="index.css"> 
  </head>
  <body class="bg-gray-900 text-white">
    <header class="flex justify-between items-center p-4 bg-gray-800">
      <div class="flex items-center">
        <img alt="Roblox logo" class="h-10" height="40" src="https://storage.googleapis.com/a1aa/image/wNLdIok8NERPn0kkRFm_jJyeFtS-KPwv4mdijHUNQUI.jpg" width="100"/>
        <nav class="ml-6 space-x-4">
          <a class="text-white" href="#">Destaques</a>
          <a class="text-white" href="#">Mercado</a>
          <a class="text-white" href="#">Criar</a>
          <a class="text-white" href="#">Robux</a>
        </nav>
      </div>
      <div class="flex items-center space-x-4">
        <input class="px-2 py-1 rounded bg-gray-700 text-white" placeholder="Pesquisar" type="text"/>
        <button class="bg-blue-600 text-white px-4 py-2 rounded">Cadastrar-se</button>
        <button class="bg-gray-700 text-white px-4 py-2 rounded">Entrar</button>
      </div>
    </header>
    <main class="flex justify-center items-center h-screen">
      <div class="bg-gray-800 p-8 rounded-lg w-full max-w-md">
        <h1 class="text-2xl font-bold mb-4">Entrar na Roblox</h1>
        <input class="w-full mb-4 px-4 py-2 rounded bg-gray-700 text-white" placeholder="Usuário/e-mail/telefone" type="text"/>
        <input class="w-full mb-4 px-4 py-2 rounded bg-gray-700 text-white" placeholder="Senha" type="password"/>
        <button class="w-full bg-blue-600 text-white px-4 py-2 rounded mb-4">Entrar</button>
        <a class="block text-center text-blue-400 mb-4" href="#">Esqueceu a senha ou nome de usuário?</a>
        <button class="w-full bg-gray-700 text-white px-4 py-2 rounded mb-4">Envie-me um código único por e-mail</button>
        <button class="w-full bg-gray-700 text-white px-4 py-2 rounded mb-4">Use outro dispositivo</button>
        <a class="block text-center text-blue-400" href="#">Não possui uma conta? Cadastrar-se</a>
      </div>
    </main>
    <footer class="flex justify-center items-center p-4 bg-gray-800 text-sm">
      <a class="text-gray-400 mx-2" href="#">Sobre nós</a>
      <a class="text-gray-400 mx-2" href="#">Vagas</a>
      <a class="text-gray-400 mx-2" href="#">Blog</a>
      <a class="text-gray-400 mx-2" href="#">Responsáveis</a>
      <a class="text-gray-400 mx-2" href="#">Cartões presente</a>
      <a class="text-gray-400 mx-2" href="#">Ajuda</a>
      <a class="text-gray-400 mx-2" href="#">Termos</a>
      <a class="text-gray-400 mx-2" href="#">Acessibilidade</a>
      <a class="text-gray-400 mx-2" href="#">Privacidade</a>
      <a class="text-gray-400 mx-2" href="#">Suas opções de privacidade</a>
    </footer>
  </body>
</html>
